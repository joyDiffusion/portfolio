<!doctype html>
<html class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
    <script defer src="../assets/scripts/main.js"></script>
    <title>Frontend Web Developer | Portfolio | Joe Inthasone</title>
</head>

<body class="h-full bg-gray-100">
    <header class="sticky top-0 z-50 bg-white">
        <nav class="bg-white  outline-1 outline-pink-500">
            <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8 outline-1 outline-amber-500">
                <div class="relative flex h-16 items-center justify-between  outline-1 outline-pink-500">
                    <div class="absolute inset-y-0 left-0 flex items-center sm:hidden z-10 outline-1 outline-pink-500">
                        <!-- Mobile menu -->
                        <button id="menu-btn" type="button"
                            class="relative inline-flex items-center justify-center rounded-md p-2 text-gray-400 hover:bg-gray-700 hover:text-white focus:ring-2 focus:ring-white focus:outline-hidden focus:ring-inset"
                            aria-controls="mobile-menu" aria-expanded="false">
                            <span class="absolute -inset-0.5"></span>
                            <span class="sr-only">Open main menu</span>

                            <!-- Icon when menu is closed -->
                            <svg id="menu-closed-icon" class="block size-6" fill="none" viewBox="0 0 24 24"
                                stroke-width="1.5" stroke="currentColor" aria-hidden="true" data-slot="icon">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                            </svg>

                            <!-- Icon when menu is open -->
                            <svg id="menu-open-icon" class="hidden size-6" fill="none" viewBox="0 0 24 24"
                                stroke-width="1.5" stroke="currentColor" aria-hidden="true" data-slot="icon">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>

                    <div
                        class="flex flex-1 items-center justify-center sm:items-stretch sm:justify-start relative outline-1 outline-green-500-500">
                        <div class="flex-none ml-4 shrink-0 items-center">
                            <img class="h-8 w-auto"
                                src="https://tailwindui.com/plus-assets/img/logos/mark.svg?color=indigo&shade=500"
                                alt="Your Company">
                        </div>

                        <div class="hidden sm:ml-6 absolute inset-0 sm:flex justify-center">
                            <div class="flex space-x-4">
                                <!-- Current: "bg-gray-900 text-white", Default: "text-gray-300 hover:bg-gray-700 hover:text-white" -->
                                <a href="#" class="rounded-md bg-gray-900 px-3 py-2 text-sm font-medium text-white"
                                    aria-current="page">Dashboard</a>
                                <a href="#"
                                    class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white">Team</a>
                                <a href="#"
                                    class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white">Projects</a>
                                <a href="#"
                                    class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white">Calendar</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Mobile menu -->
            <div id="mobile-menu" class="hidden sm:hidden outline-1 outline-pink-500">
                <div class="space-y-1 px-2 pt-2 pb-3 outline-1 outline-pink-500">
                    <!-- Current: "bg-gray-900 text-white", Default: "text-gray-300 hover:bg-gray-700 hover:text-white" -->
                    <a href="#" class="block rounded-md bg-gray-900 px-3 py-2 text-base font-medium text-white"
                        aria-current="page">Home</a>
                    <a href="#"
                        class="block rounded-md px-3 py-2 text-base font-medium text-gray-300 hover:bg-gray-700 hover:text-white">About</a>
                    <a href="#"
                        class="block rounded-md px-3 py-2 text-base font-medium text-gray-300 hover:bg-gray-700 hover:text-white">Projects</a>
                    <a href="#"
                        class="block rounded-md px-3 py-2 text-base font-medium text-gray-300 hover:bg-gray-700 hover:text-white">Contact</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8 outline-1 outline-blue-700">
            <!-- Hero section -->
            <div class="mx-auto max-w-2xl py-32 sm:py-48 lg:py-56 outline-1 outline-lime-500">
                <div class="text-center outline-1 outline-pink-500">
                    <h1 class="text-5xl font-semibold tracking-tight text-balance text-gray-900 sm:text-7xl">
                        Hi, I am Joe
                    </h1>

                    <p class="mt-8 text-lg font-medium text-pretty text-gray-500 sm:text-xl/8">
                        An aspiring front-end developer passionate about creating accessible, responsive, visually
                        stunning websites. Let's build something amazing together.
                    </p>

                    <div class="mt-10 flex items-center justify-center gap-x-6 outline-1 outline-pink-500">
                        <a href="#"
                            class="rounded-md bg-indigo-600 px-3.5 py-2.5 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Projects</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
